name: main

on:
  push:
    branches: [main]

  workflow_dispatch: {}

# Never cancel in flight: this pipeline also cuts stable releases. Newer pushes queue.
concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  # Warm the binary cache upstream so test and build consume it on the same commit.
  warm:
    runs-on: macos-26
    strategy:
      matrix:
        configuration: [Debug, Release]
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - run: make warm-cache
        env:
          TUIST_CACHE_CONFIGURATION: ${{ matrix.configuration }}

  test:
    runs-on: macos-26
    needs: [warm]
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
      - parallel:
          - run: make lint
          - run: make inspect-dependencies
      - run: make build-app
        env:
          XCODEBUILD_FLAGS: -showBuildTimingSummary
      - run: make test

  check:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check if tip release already exists for this commit
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TIP_SHA=$(gh api repos/${{ github.repository }}/git/ref/tags/tip --jq '.object.sha' 2>/dev/null || echo "")
          ASSET_COUNT=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
          if [ "$TIP_SHA" = "${{ github.sha }}" ] && [ "$ASSET_COUNT" -gt 0 ]; then
            echo "Tip already points at ${{ github.sha }} with $ASSET_COUNT assets, skipping"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    runs-on: macos-26
    needs: [check, warm]
    if: needs.check.outputs.should_skip != 'true'
    permissions:
      contents: read
      id-token: write
    env:
      MISE_HTTP_TIMEOUT: 120
      MISE_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DEVELOPER_ID_CERT_P12: ${{ secrets.DEVELOPER_ID_CERT_P12 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
      DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_NOTARIZATION_ISSUER: ${{ secrets.APPLE_NOTARIZATION_ISSUER }}
      APPLE_NOTARIZATION_KEY_ID: ${{ secrets.APPLE_NOTARIZATION_KEY_ID }}
      APPLE_NOTARIZATION_KEY: ${{ secrets.APPLE_NOTARIZATION_KEY }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: ./.github/actions/setup-macos
        with:
          disable-tools: spm:swiftlang/swift-format
      - parallel:
          - name: Prepare build overrides
            env:
              SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
              POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
              POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
            run: |
              set -euo pipefail
              : "${SENTRY_DSN:?secret SENTRY_DSN is not set}"
              : "${POSTHOG_API_KEY:?secret POSTHOG_API_KEY is not set}"
              : "${POSTHOG_HOST:?secret POSTHOG_HOST is not set}"
              # Epoch build number: monotonic, computed once here so the single binary reused by tip and stable carries one version.
              BUILD_NUMBER=$(date +%s)
              mkdir -p build
              # xcconfig treats // as a comment, which truncates URL values (https://… → https:).
              # Break every // with $() (evaluates to empty) so the parser never sees a literal //.
              xcconfig_escape() { printf '%s' "$1" | sed 's#//#/$()/#g'; }
              cat > build/ReleaseOverrides.xcconfig <<EOF
              CURRENT_PROJECT_VERSION = $BUILD_NUMBER
              SENTRY_DSN = $(xcconfig_escape "$SENTRY_DSN")
              POSTHOG_API_KEY = $(xcconfig_escape "$POSTHOG_API_KEY")
              POSTHOG_HOST = $(xcconfig_escape "$POSTHOG_HOST")
              EOF
              echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
              echo "XCODE_XCCONFIG_FILE=$PWD/build/ReleaseOverrides.xcconfig" >> "$GITHUB_ENV"
          - name: Setup keychain
            run: |
              echo "$DEVELOPER_ID_CERT_P12" | base64 --decode > build-cert.p12
              security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security set-keychain-settings -t 3600 -u build.keychain
              security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
              security import build-cert.p12 -k build.keychain -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild > /dev/null
              security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" build.keychain > /dev/null
              security list-keychains -d user -s build.keychain $(security list-keychains -d user | tr -d '"')
              security default-keychain -s build.keychain
              DEVELOPER_ID_IDENTITY_SHA=$(security find-identity -v -p codesigning build.keychain | grep "Developer ID Application" | head -1 | awk '{print $2}')
              if [ -z "$DEVELOPER_ID_IDENTITY_SHA" ]; then
                echo "::error::Developer ID Application identity not found in keychain"
                exit 1
              fi
              echo "DEVELOPER_ID_IDENTITY_SHA=$DEVELOPER_ID_IDENTITY_SHA" >> "$GITHUB_ENV"
      - name: Archive workspace
        run: make archive
      - name: Upload dSYMs
        uses: actions/upload-artifact@v6
        with:
          name: dsyms
          path: build/supacode.xcarchive/dSYMs
      - run: |
          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
          <string>$DEVELOPER_ID_IDENTITY</string>
            <key>teamID</key>
            <string>$APPLE_TEAM_ID</string>
          </dict>
          </plist>
          EOF
          make export-archive
      - name: Verify embedded telemetry config
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          POSTHOG_API_KEY: ${{ secrets.POSTHOG_API_KEY }}
          POSTHOG_HOST: ${{ secrets.POSTHOG_HOST }}
        run: |
          set -euo pipefail
          APP_PATH="$(find build/export -name "supacode.app" -maxdepth 3 -print -quit)"
          PLIST="$APP_PATH/Contents/Info.plist"
          assert_eq() {
            local key="$1" expected="$2"
            local actual
            actual="$(/usr/libexec/PlistBuddy -c "Print :$key" "$PLIST")"
            if [ "$actual" != "$expected" ]; then
              echo "::error::$key embedded as '$actual' but expected '$expected' (xcconfig // truncation?)"
              exit 1
            fi
            echo "$key OK"
          }
          assert_eq SentryDSN "$SENTRY_DSN"
          assert_eq PostHogAPIKey "$POSTHOG_API_KEY"
          assert_eq PostHogHost "$POSTHOG_HOST"
      - name: Re-sign frameworks
        run: |
          set -ex
          APP_PATH="$(find build/export -name "supacode.app" -maxdepth 3 -print -quit)"
          bash ./.github/scripts/resign_exported_app.sh build/export

          codesign -d --entitlements - "$APP_PATH/Contents/MacOS/supacode" 2>&1 | tee /tmp/supacode-entitlements.txt
          grep -q "com.apple.security.device.audio-input" /tmp/supacode-entitlements.txt

      - name: Store notarization credentials
        run: |
          echo "$APPLE_NOTARIZATION_KEY" > notarization_key.p8
          xcrun notarytool store-credentials "notarytool-profile" \
            --key notarization_key.p8 \
            --key-id "$APPLE_NOTARIZATION_KEY_ID" \
            --issuer "$APPLE_NOTARIZATION_ISSUER"
          rm notarization_key.p8
      - name: Build DMG
        run: |
          APP_PATH="$(find build/export -name "supacode.app" -maxdepth 3 -print -quit)"

          mise exec -- create-dmg "$APP_PATH" build/ \
            --overwrite \
            --dmg-title="Supacode" \
            --identity="$DEVELOPER_ID_IDENTITY_SHA"

          DMG_OUTPUT=$(find build -name "*.dmg" -maxdepth 1 | head -1)
          if [ "$DMG_OUTPUT" != "build/supacode.dmg" ]; then
            mv "$DMG_OUTPUT" build/supacode.dmg
          fi
      - name: Notarize and staple
        run: |
          set -euo pipefail
          APP_PATH="$(find build/export -name "supacode.app" -maxdepth 3 -print -quit)"
          NOTARY_RESULT_PATH=build/notarytool-submit.json
          NOTARY_LOG_PATH=build/notarytool-log.json
          NOTARY_STATUS=""
          NOTARY_ID=""
          for attempt in 1 2 3; do
            echo "Notarization attempt $attempt..."
            submit_exit=0
            if ! xcrun notarytool submit build/supacode.dmg \
              --keychain-profile "notarytool-profile" \
              --wait \
              --output-format json > "$NOTARY_RESULT_PATH"; then
              submit_exit=$?
            fi
            NOTARY_STATUS="$(jq -r '.status // empty' "$NOTARY_RESULT_PATH" 2>/dev/null || true)"
            NOTARY_ID="$(jq -r '.id // empty' "$NOTARY_RESULT_PATH" 2>/dev/null || true)"
            cat "$NOTARY_RESULT_PATH" || true
            if [ "$submit_exit" -eq 0 ] && [ "$NOTARY_STATUS" = "Accepted" ]; then
              break
            fi
            if [ -n "$NOTARY_ID" ]; then
              xcrun notarytool log "$NOTARY_ID" --keychain-profile "notarytool-profile" > "$NOTARY_LOG_PATH" || true
              cat "$NOTARY_LOG_PATH" || true
            fi
            echo "Attempt $attempt failed, retrying in 30s..."
            sleep 30
          done
          if [ "$NOTARY_STATUS" != "Accepted" ]; then
            echo "::error::Notarization failed with status '$NOTARY_STATUS'"
            exit 1
          fi
          xcrun stapler staple build/supacode.dmg
          xcrun stapler staple "$APP_PATH"
      - name: Create app zip for Sparkle
        run: |
          APP_PATH="$(find build/export -name "supacode.app" -maxdepth 3 -print -quit)"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" build/supacode.app.zip
      - name: Generate tip appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          MAX_DELTAS=10
          STAGING=$(mktemp -d)
          cp build/supacode.app.zip "$STAGING/"

          # Download previous tip builds stored as history assets
          ASSETS=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets[].name' 2>/dev/null || true)
          for asset in $ASSETS; do
            case "$asset" in
              supacode-history-*.app.zip)
                gh release download tip -p "$asset" -O "$STAGING/$asset" -R "${{ github.repository }}" 2>/dev/null || true
                ;;
            esac
          done

          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | ./bins/generate_appcast \
            --download-url-prefix "https://supacode.sh/download/tip/" \
            --maximum-versions $((MAX_DELTAS + 1)) \
            --maximum-deltas $MAX_DELTAS \
            --delta-compression lzma \
            --ed-key-file - "$STAGING"
          # Inject sparkle:channel tag into the tip items
          sed -i '' 's|<enclosure |<sparkle:channel>tip</sparkle:channel>\n            <enclosure |' "$STAGING/appcast.xml"
          cp "$STAGING/appcast.xml" build/appcast.xml
          find "$STAGING" -name "*.delta" -exec cp {} build/ \; 2>/dev/null || true
      - uses: actions/upload-artifact@v6
        with:
          name: build-artifacts
          path: |
            build/supacode.dmg
            build/supacode.app.zip
            build/appcast.xml
            build/*.delta

  # Gated on build so a stable release is only detected when the binary exists.
  # The matching tag (pushed via --follow-tags) marks this exact commit as vX.Y.Z.
  detect:
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
    outputs:
      release_tag: ${{ steps.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - id: detect
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION=$(awk -F' = ' '/^MARKETING_VERSION = /{gsub(/\r/,"",$2); print $2; exit}' Configurations/Project.xcconfig)
          TAG="v$VERSION"
          RELEASE_TAG=""
          if [ "$(git rev-list -n 1 "$TAG" 2>/dev/null || true)" = "${{ github.sha }}" ]; then
            # Idempotency: skip if this release was already published (re-run safety).
            ASSET_COUNT=$(gh release view "$TAG" -R "${{ github.repository }}" --json assets --jq '.assets | length' 2>/dev/null || echo "0")
            if [ "$ASSET_COUNT" -eq 0 ]; then
              RELEASE_TAG="$TAG"
            else
              echo "$TAG already has $ASSET_COUNT assets, skipping stable publish"
            fi
          fi
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"

  tag:
    runs-on: ubuntu-latest
    needs: [check, build]
    if: needs.check.outputs.should_skip != 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GH_RELEASE_TOKEN }}
      - name: Force-move tip tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -fa tip -m "Latest Continuous Release" ${{ github.sha }}
          git push --force origin tip

  sentry-dsym:
    runs-on: ubuntu-latest
    needs: [check, build]
    if: needs.check.outputs.should_skip != 'true'
    steps:
      - parallel:
          - name: Install sentry-cli
            run: curl -sL https://sentry.io/get-cli/ | sh
          - uses: actions/download-artifact@v7
            with:
              name: dsyms
              path: dsyms
      - name: Upload dSYMs to Sentry
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: supabit
          SENTRY_PROJECT: supacode
        run: sentry-cli debug-files upload --include-sources dsyms

  # Stable release: reuses the SAME notarized binaries build produced (no second
  # archive or notarization) and publishes them with auto-generated notes.
  publish-stable:
    runs-on: macos-26
    needs: [build, detect]
    if: ${{ needs.detect.outputs.release_tag != '' }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
      RELEASE_REPO: ${{ github.repository }}
      TAG: ${{ needs.detect.outputs.release_tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: build
      - name: Drop the tip appcast/deltas from the shared artifact
        run: rm -f build/appcast.xml build/*.delta
      - name: Generate release notes
        run: |
          set -euo pipefail
          PREV=$(gh release list --exclude-drafts --exclude-pre-releases -R "$RELEASE_REPO" --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -n "$PREV" ] && [ "$PREV" != "$TAG" ]; then
            gh api "repos/$RELEASE_REPO/releases/generate-notes" -f tag_name="$TAG" -f previous_tag_name="$PREV" --jq '.body' > build/release-notes.md
          else
            gh api "repos/$RELEASE_REPO/releases/generate-notes" -f tag_name="$TAG" --jq '.body' > build/release-notes.md
          fi
          # Prepend the tag's headline ahead of "## What's Changed". Gate on an
          # annotated tag, else a lightweight tag reads the commit subject.
          HEADLINE=""
          if [ "$(git cat-file -t "$TAG" 2>/dev/null)" = tag ]; then
            # Strip any signature defensively; these notes also feed the Sparkle appcast.
            HEADLINE=$(git tag -l --format='%(contents:subject)%0a%0a%(contents:body)' "$TAG" | sed '/-----BEGIN .*SIGNATURE-----/,$d')
          fi
          # Prepend only a well-formed headline: a `## ` subject with a non-empty body.
          SUBJECT=$(printf '%s\n' "$HEADLINE" | sed -n '1p')
          BODY=$(printf '%s\n' "$HEADLINE" | sed '1,2d')
          case "$SUBJECT" in
            '## '*)
              if [ -n "$(printf '%s' "$BODY" | tr -d '[:space:]')" ]; then
                { printf '%s\n\n' "$HEADLINE"; cat build/release-notes.md; } > build/release-notes.md.new
                mv build/release-notes.md.new build/release-notes.md
              fi
              ;;
          esac
      - name: Generate appcast with history and deltas
        run: |
          set -euo pipefail
          MAX_DELTAS=10
          NOTES_FILE=build/release-notes.md
          STAGING=$(mktemp -d)
          ARCHIVE=build/supacode.app.zip
          ARCHIVE_BASE=$(basename "$ARCHIVE")
          ARCHIVE_BASE="${ARCHIVE_BASE%.zip}"
          cp "$ARCHIVE" "$STAGING/"
          cp "$NOTES_FILE" "$STAGING/$ARCHIVE_BASE.md"

          curl -fsSL "https://supacode.sh/download/latest/appcast.xml" -o "$STAGING/appcast.xml" || true

          SEEN_VERSIONS=""
          for i in $(seq 1 $MAX_DELTAS); do
            PREV_TAG=$(gh release list --limit $i --exclude-drafts --exclude-pre-releases -R "$RELEASE_REPO" --json tagName --jq ".[$((i-1))].tagName" 2>/dev/null || true)
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$TAG" ]; then
              gh release download "$PREV_TAG" -p "supacode.app.zip" -O "$STAGING/supacode-$PREV_TAG.app.zip" -R "$RELEASE_REPO" 2>/dev/null || true
              if [ -f "$STAGING/supacode-$PREV_TAG.app.zip" ]; then
                BUNDLE_VERSION=$(unzip -p "$STAGING/supacode-$PREV_TAG.app.zip" "supacode.app/Contents/Info.plist" 2>/dev/null | /usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" /dev/stdin 2>/dev/null || echo "")
                if [ -n "$BUNDLE_VERSION" ] && echo "$SEEN_VERSIONS" | grep -q "^$BUNDLE_VERSION$"; then
                  rm -f "$STAGING/supacode-$PREV_TAG.app.zip"
                else
                  [ -n "$BUNDLE_VERSION" ] && SEEN_VERSIONS="$SEEN_VERSIONS$BUNDLE_VERSION"$'\n'
                  gh release view "$PREV_TAG" -R "$RELEASE_REPO" --json body --jq '.body' > "$STAGING/supacode-$PREV_TAG.app.md" 2>/dev/null || true
                fi
              fi
            fi
          done

          printf "%s" "$SPARKLE_PRIVATE_KEY" | tr -d '\r\n\t ' | ./bins/generate_appcast --download-url-prefix "https://supacode.sh/download/$TAG/" --full-release-notes-url "https://github.com/supabitapp/supacode/releases" --embed-release-notes --maximum-versions $MAX_DELTAS --maximum-deltas $MAX_DELTAS --delta-compression lzma --ed-key-file - "$STAGING"
          cp "$STAGING/appcast.xml" build/appcast.xml
          find "$STAGING" -name "*.delta" -exec cp {} build/ \; 2>/dev/null || true
      - name: Generate checksums
        run: |
          set -euo pipefail
          DELTA_FILES=$(find build -name "*.delta" -type f | sort | tr '\n' ' ' || true)
          python3 scripts/generate_release_checksums.py "$TAG" build/checksums.json build/supacode.dmg build/supacode.app.zip $DELTA_FILES
      - name: Create release and upload assets
        run: |
          set -euo pipefail
          gh release create "$TAG" --title "$TAG" --notes-file build/release-notes.md --target "${{ github.sha }}" -R "$RELEASE_REPO" 2>/dev/null || \
          gh release edit "$TAG" --target "${{ github.sha }}" -R "$RELEASE_REPO"
          DELTA_FILES=$(find build -name "*.delta" -type f 2>/dev/null | tr '\n' ' ' || true)
          gh release upload "$TAG" build/supacode.app.zip build/supacode.dmg build/appcast.xml build/checksums.json $DELTA_FILES --clobber -R "$RELEASE_REPO"
      - name: Verify download URLs
        run: |
          set -euo pipefail
          curl -fsSL "https://supacode.sh/download/$TAG/checksums.json" -o /dev/null
          curl -fsSL "https://supacode.sh/download/$TAG/supacode.app.zip" -o /dev/null
          curl -fsSL "https://supacode.sh/download/$TAG/supacode.dmg" -o /dev/null

  # Ordered after publish-stable so the tip item merges into any freshly cut release. Tolerates a skip
  # (non-release commits) but blocks on its failure, so the tip merge never runs against a half-published release.
  publish:
    runs-on: ubuntu-latest
    needs: [check, build, tag, publish-stable]
    if: ${{ !cancelled() && needs.check.outputs.should_skip != 'true' && needs.build.result == 'success' && needs.tag.result == 'success' && (needs.publish-stable.result == 'success' || needs.publish-stable.result == 'skipped') }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: build-artifacts
          path: build
      - name: Update tip release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create tip --prerelease --title 'Supacode Tip ("Nightly")' --target "${{ github.sha }}" --notes "" -R "${{ github.repository }}" 2>/dev/null ||
          gh release edit tip --prerelease --title 'Supacode Tip ("Nightly")' --target "${{ github.sha }}" -R "${{ github.repository }}"

          # Delete stale delta files from previous tip
          STALE_DELTAS=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '.assets[].name | select(endswith(".delta"))' 2>/dev/null || true)
          for d in $STALE_DELTAS; do
            gh release delete-asset tip "$d" -R "${{ github.repository }}" -y 2>/dev/null || true
          done

          DELTA_FILES=$(find build -name "*.delta" -type f 2>/dev/null | tr '\n' ' ' || true)
          python3 scripts/generate_release_checksums.py tip build/checksums.json build/supacode.dmg build/supacode.app.zip $DELTA_FILES
          gh release upload tip build/supacode.dmg build/supacode.app.zip build/appcast.xml build/checksums.json $DELTA_FILES --clobber -R "${{ github.repository }}"

          # Store current build as history asset for future delta generation
          MAX_DELTAS=10
          cp build/supacode.app.zip "build/supacode-history-${{ github.run_number }}.app.zip"
          gh release upload tip "build/supacode-history-${{ github.run_number }}.app.zip" --clobber -R "${{ github.repository }}"

          # Prune oldest history assets beyond MAX_DELTAS
          HISTORY=$(gh release view tip -R "${{ github.repository }}" --json assets --jq '[.assets[].name | select(startswith("supacode-history-"))] | sort | reverse' 2>/dev/null || echo "[]")
          PRUNE=$(echo "$HISTORY" | jq -r ".[$MAX_DELTAS:][]" 2>/dev/null || true)
          for old in $PRUNE; do
            gh release delete-asset tip "$old" -R "${{ github.repository }}" -y 2>/dev/null || true
          done
      - name: Merge tip item into production appcast
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST_TAG=$(gh release list --exclude-drafts --exclude-pre-releases -R "${{ github.repository }}" --json tagName --jq '.[0].tagName' 2>/dev/null || echo "")
          if [ -z "$LATEST_TAG" ]; then
            echo "No stable release found, skipping appcast merge"
            exit 0
          fi
          gh release download "$LATEST_TAG" -p "appcast.xml" -O stable_appcast.xml -R "${{ github.repository }}" 2>/dev/null || exit 0

          python3 - stable_appcast.xml build/appcast.xml merged_appcast.xml <<'PYEOF'
          import sys
          import xml.etree.ElementTree as ET

          ET.register_namespace('sparkle', 'http://www.andymatuschak.org/xml-namespaces/sparkle')
          ET.register_namespace('dc', 'http://purl.org/dc/elements/1.1/')

          stable_path, tip_path, out_path = sys.argv[1], sys.argv[2], sys.argv[3]

          stable_tree = ET.parse(stable_path)
          stable_root = stable_tree.getroot()
          tip_tree = ET.parse(tip_path)
          tip_root = tip_tree.getroot()

          ns = {'sparkle': 'http://www.andymatuschak.org/xml-namespaces/sparkle'}
          stable_channel = stable_root.find('.//channel')

          # Remove existing tip items from stable appcast
          for item in stable_channel.findall('item'):
              ch = item.find('sparkle:channel', ns)
              if ch is not None and ch.text == 'tip':
                  stable_channel.remove(item)

          # Add new tip items from tip appcast
          tip_channel = tip_root.find('.//channel')
          for item in tip_channel.findall('item'):
              stable_channel.append(item)

          stable_tree.write(out_path, xml_declaration=True, encoding='utf-8')
          PYEOF

          mv merged_appcast.xml appcast.xml
          gh release upload "$LATEST_TAG" appcast.xml --clobber -R "${{ github.repository }}"
