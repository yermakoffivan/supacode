name: Setup macOS build deps
description: Install + cache mise tools and Ghostty build outputs

runs:
  using: composite
  steps:
    # The bundled zig (0.15.2) self-hosted linker can't link the macOS 26.4+ SDK
    # (ziglang/zig#31272), which breaks `make build-ghostty-xcframework`. Pin to the
    # newest installed Xcode <= 26.3, whose SDK zig can link.
    - name: Select Xcode <= 26.3
      shell: bash
      run: |
        set -euo pipefail
        selected=""
        for app in /Applications/Xcode_26.3*.app /Applications/Xcode_26.2*.app \
          /Applications/Xcode_26.1*.app /Applications/Xcode_26.0*.app; do
          if [ -d "$app" ]; then selected="$app"; break; fi
        done
        if [ -z "$selected" ]; then
          echo "No Xcode <= 26.3 found on runner; available:" >&2
          ls -d /Applications/Xcode_*.app >&2 || true
          exit 1
        fi
        sudo xcode-select -s "$selected/Contents/Developer"
        xcodebuild -version
    - uses: jdx/mise-action@v4
      with:
        version: 2026.3.0
        cache: true
    - name: Authenticate with Tuist
      if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
      shell: bash
      run: mise exec -- tuist auth login
    - name: Xcode cache key
      shell: bash
      run: |
        XCODE_VERSION="$(xcodebuild -version | tr '\n' '-' | sed 's/[^A-Za-z0-9._-]/_/g; s/-$//')"
        printf '%s\n' "XCODE_VERSION=$XCODE_VERSION" >> "$GITHUB_ENV"
    - name: Ghostty cache key
      shell: bash
      run: |
        set -euo pipefail
        GHOSTTY_SHA="$(git -C ThirdParty/ghostty rev-parse HEAD)"
        printf '%s\n' "GHOSTTY_SHA=$GHOSTTY_SHA" >> "$GITHUB_ENV"
    - name: Ghostty cache
      id: ghostty_cache
      uses: actions/cache@v5
      with:
        path: .build/ghostty
        key: ${{ runner.os }}-${{ runner.arch }}-xcode-${{ env.XCODE_VERSION }}-ghostty-v2-${{ env.GHOSTTY_SHA }}-${{ hashFiles('.github/actions/setup-macos/action.yml', 'Project.swift', 'scripts/build-ghostty.sh', 'mise.toml', '.gitmodules') }}
    - name: Build ghostty
      if: steps.ghostty_cache.outputs.cache-hit != 'true'
      shell: bash
      run: |
        set -euo pipefail
        make build-ghostty-xcframework
